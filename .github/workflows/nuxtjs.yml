name: Deploy Nuxt site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Sync Submodules
        run: git submodule update --init --recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: nuxt


      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compare dependency versions
        run: pnpm list @nuxt/content nitropack nitro unstorage better-sqlite3 --depth 0

      - name: Clean Cache
        run: rm -rf .nuxt .output # Force a truly fresh build

      - name: Debug Submodule Path
        run: |
          echo "Listing contents of docs directory:"
          ls -R ./docs

      - name: Verify native modules
        run: |
          node -e "const db = require('better-sqlite3')(':memory:'); console.log('better-sqlite3 OK', db)"

      - name: Static HTML export with Nuxt
        run: pnpm run generate
        env:
          NITRO_PRESET: github-pages

      - name: Inspect built content DB
        run: |
          echo "Searching for content DB artifacts..."
          find .output -iname "*.db" -o -iname "*sql_dump*" -o -iname "*content*"
          echo "---"
          echo "Public output tree:"
          find .output/public -maxdepth 3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
